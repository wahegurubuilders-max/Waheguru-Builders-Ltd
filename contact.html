<!DOCTYPE html>
<html>
<head>
<title>Waheguru Builders Ltd</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* GLOBAL */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
color:#111;
line-height:1.6;
}

/* HEADER */
.nav{
position:fixed;
top:0;
width:100%;
display:flex;
align-items:center;
justify-content:space-between; /* 👈 IMPORTANT */
padding:18px 40px;
background:white;
border-bottom:1px solid #eee;
z-index:1000;
}
.logo img{
height:50px;
transform:scale(1.75);
transform-origin:left center;
}

/* MENU */
.menu{
display:flex;
gap:25px;
margin-left:auto;
margin-right:60px; /* 👈 THIS brings it slightly left */
}
.menu a{
text-decoration:none;
color:#333;
font-weight:500;
position:relative;
padding-bottom:5px;
}

.menu a::after{
content:'';
position:absolute;
left:0;
bottom:0;
width:0%;
height:2px;
background:#d4af37;
transition:0.3s;
}

.menu a:hover{
color:#d4af37;
}

.menu a:hover::after{
width:100%;
}
/* HERO */
.hero{
height:55vh;
background:
linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
url('https://images.unsplash.com/photo-1600607688969-a5bfcd646154');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{
font-size:42px;
}

/* SECTION */
.section{
padding:100px 20px;
background:#f8f8f8;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:40px;
}

/* CONTACT INFO */
.contact-box{
width:350px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

.contact-box h3{
margin-bottom:20px;
}

.contact-item{
margin:12px 0;
color:#555;
}

/* FORM */
.form{
width:400px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

/* ⭐ LUXURY BUTTON */
.btn{
margin-top:15px;
padding:15px 40px;
background:linear-gradient(135deg,#d4af37,#f5d76e,#b8962e);
color:#111;
border:none;
border-radius:50px;
font-weight:600;
letter-spacing:0.5px;
cursor:pointer;
position:relative;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
transition:all 0.3s ease;
}

/* SHINE EFFECT */
.btn::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.5),transparent);
transition:0.6s;
}

.btn:hover::before{
left:100%;
}

/* HOVER */
.btn:hover{
transform:translateY(-3px) scale(1.03);
box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.btn:active{
transform:scale(0.97);
}


/* WHATSAPP BOX */
.whatsapp-box{
margin-top:20px;
padding:15px;
background:#25D366;
color:white;
border-radius:10px;
text-align:center;
font-weight:600;
text-decoration:none;
display:block;
}

/* FOOTER */
footer{
background:white;
padding:40px;
border-top:1px solid #eee;
}

.footer-container{
display:flex;
align-items:center;
gap:50px;
max-width:1200px;
margin:auto;
}

.footer-logo img{height:120px;}

/* MOBILE */
@media(max-width:768px){
.nav{flex-direction:column;align-items:flex-start;padding:10px 20px;}
.menu{flex-wrap:wrap;gap:10px;margin-top:10px;}
.section{flex-direction:column;align-items:center;}
.footer-container{flex-direction:column;}
.footer-logo img{height:90px;}
}
/* MOBILE SAFE FIXES */
@media(max-width:768px){

flex-direction:column;
align-items:flex-start;
padding:12px 20px;
}

.menu{
flex-wrap:wrap;
gap:12px;
margin-top:10px;
margin-right:0;
}

/* HERO */

height:80vh;
padding-top:60px;
}

.hero h1{
font-size:28px;
line-height:1.3;
}

.hero p{
font-size:14px;
}

/* BUTTON */
.btn{
padding:12px 25px;
font-size:14px;
}

/* CARDS */
.card,
.service-card{
width:90% !important;
margin:auto;
}

/* GALLERY */
.gallery{
padding:80px 10px;
gap:12px;
}

.gallery img{
height:200px;
}

/* FOOTER */
.footer-container{
flex-direction:column;
align-items:flex-start;
gap:20px;
}

.footer-logo img{
height:90px;
}

</style>
</head>
