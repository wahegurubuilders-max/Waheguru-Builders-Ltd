body{

/* HEADER */
.nav{
position:fixed;
top:0;
width:100%;
display:flex;
align-items:center;
padding:18px 60px; /* 👈 your fix */
background:white;
border-bottom:1px solid #eee;
z-index:1000;
}

.menu{
display:flex;
gap:25px;
margin-left:auto;
margin-right:60px;
}
  
.logo img{
height:50px;
transform:scale(1.78);
transform-origin:left center;
}

.menu a{
text-decoration:none;
color:#333;
font-weight:500;
position:relative;
}

.menu a::after{
content:'';
position:absolute;
left:0;
bottom:-5px;
width:0%;
height:2px;
background:#d4af37;
transition:0.3s;
}

.menu a:hover{
color:#d4af37;
}

.menu a:hover::after{
width:100%;
}
  
/* HERO IMAGE */
.hero{
height:90vh;
background:
linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
url('https://images.unsplash.com/photo-1600585154526-990dced4db0d');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:#eee;
}

/* SECTION */
.section{
padding:80px 20px;
text-align:center;
background:#fafafa;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
}

.card{
width:280px;
padding:30px;
background:white;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.06);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 15px 35px rgba(0,0,0,0.1);
}

.card h3{
margin-bottom:10px;
}

.card p{
font-size:14px;
color:#555;
}

/* FOOTER */
footer{
background:white;
padding:40px;
border-top:1px solid #eee;
}

.footer-container{
display:flex;
align-items:center;
gap:50px;
max-width:1200px;
margin:auto;
}

.footer-logo img{
height:120px;
}

.footer-details p{
margin:6px 0;
color:#555;
}
/* MOBILE SAFE FIXES */
@media(max-width:768px){

/* HEADER */
.nav{
flex-direction:column;
align-items:flex-start;
padding:12px 20px;
}

.menu{
flex-wrap:wrap;
gap:12px;
margin-top:10px;
margin-right:0;
}

/* HERO */
.hero{
height:80vh;
padding-top:60px;
}

.hero h1{
font-size:28px;
line-height:1.3;
}

.hero p{
font-size:14px;
}

/* BUTTON */
.btn{
padding:14px 35px;
border-radius:50px;
background:linear-gradient(135deg,#d4af37,#f5d76e,#b8962e);
color:#111;
text-decoration:none;
font-weight:600;
position:relative;
overflow:hidden;
transition:0.3s;
}

.btn:hover{
transform:translateY(-4px);
}

.btn::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.7),transparent);
transition:0.6s;
}

.btn:hover::before{
left:100%;
}
/* CARDS */
.card,
.service-card{
width:90% !important;
margin:auto;
}

/* GALLERY */
.gallery{
padding:80px 10px;
gap:12px;
}

.gallery img{
height:200px;
}

/* FOOTER */
.footer-container{
flex-direction:column;
align-items:flex-start;
gap:20px;
}

.footer-logo img{
height:90px;
}

/* WHATSAPP */

.wa-float{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
z-index:9999;
}

.wa-float svg{
width:28px;
fill:white;
}

.wa-float::after{
content:'';
position:absolute;
width:100%;
height:100%;
border-radius:50%;
background:rgba(37,211,102,0.4);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
70%{transform:scale(1.6);opacity:0;}
100%{opacity:0;}
}
