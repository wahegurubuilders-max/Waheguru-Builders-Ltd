<!DOCTYPE html>
<html>
<head>
<title>Reviews - Waheguru Builders Ltd</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{margin:0;font-family:'Segoe UI',sans-serif;color:#111;}

/* HEADER */
.nav{
position:fixed;
top:0;
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 40px;
background:white;
border-bottom:1px solid #eee;
z-index:1000;
}

.logo img{
height:50px;
transform:scale(1.78);
transform-origin:left center;
}

.menu{
display:flex;
gap:25px;
margin-right:70px;
}

.menu a{
color:#333;
text-decoration:none;
font-weight:500;
}

/* HERO (UPGRADED IMAGE) */
.hero{
height:55vh;
background:
linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
url('https://images.unsplash.com/photo-1600607687939-ce8a6c25118c');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{
font-size:42px;
letter-spacing:1px;
}

/* SECTION */
.section{
padding:100px 20px;
background:#f8f8f8;
text-align:center;
}

/* EMPTY */
.empty{
color:#777;
margin-bottom:40px;
}

/* REVIEWS */
.reviews{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
max-width:1200px;
margin:auto;
}

/* CARD */
.review-card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
text-align:left;
transition:0.3s;
}

.review-card:hover{
transform:translateY(-6px);
}

/* HEADER ROW */
.review-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
}

.customer{
font-weight:bold;
font-size:16px;
}

.stars{
color:#d4af37;
font-size:16px;
}

/* TEXT */
.review-text{
font-size:14px;
color:#555;
line-height:1.6;
}

/* FORM */
.form{
max-width:500px;
margin:70px auto 0 auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

/* STAR SELECT */
.star-select span{
font-size:26px;
cursor:pointer;
color:#ccc;
}

.star-select span.active{
color:#d4af37;
}

/* BUTTON */
.btn{
margin-top:10px;
padding:14px 30px;
background:linear-gradient(135deg,#d4af37,#b8962e);
border:none;
border-radius:50px;
font-weight:600;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
}

.btn:hover{
transform:translateY(-3px);
}

/* FOOTER (UPDATED WITH EMAIL) */
footer{
background:white;
padding:40px;
border-top:1px solid #eee;
}

.footer-container{
display:flex;
align-items:center;
gap:50px;
max-width:1200px;
margin:auto;
}

.footer-logo img{height:120px;}

.footer-details p{
margin:6px 0;
color:#555;
}

/* MOBILE */
@media(max-width:768px){
.nav{flex-direction:column;align-items:flex-start;padding:10px 20px;}
.menu{flex-wrap:wrap;gap:10px;margin-top:10px;}
.footer-container{flex-direction:column;}
.footer-logo img{height:90px;}
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div class="logo"><a href="index.html"><img src="logo.png"></a></div>

<div class="menu">
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="gallery.html">Gallery</a>
<a href="reviews.html">Reviews</a>
<a href="contact.html">Contact</a>
</div>
</div>

<!-- HERO -->
<div class="hero">
<h1>Customer Reviews</h1>
</div>

<!-- SECTION -->
<div class="section">

<p class="empty">No reviews yet. Be the first to share your experience.</p>

<div class="reviews" id="reviewsList"></div>

<!-- FORM -->
<div class="form">

<h3>Leave Your Feedback</h3>

<input type="text" id="name" placeholder="Your Name">

<textarea id="message" placeholder="Describe your experience"></textarea>

<div class="star-select" id="stars">
<span onclick="setRating(1)">★</span>
<span onclick="setRating(2)">★</span>
<span onclick="setRating(3)">★</span>
<span onclick="setRating(4)">★</span>
<span onclick="setRating(5)">★</span>
</div>

<button class="btn" onclick="addReview()">Submit Review</button>

</div>

</div>

<!-- FOOTER -->
<footer>
<div class="footer-container">

<div class="footer-logo">
<img src="logo.png">
</div>

<div class="footer-details">
<p><strong>Waheguru Builders Ltd</strong></p>
<p>Company No: 14736396</p>
<p>📍 8 Ash Lane, Windsor</p>
<p>📞 +44-7424479788</p>
<p>✉️ wahegurubuilders@gmail.com</p>
</div>

</div>
</footer>

<!-- SCRIPT -->
<script>

let rating = 0;

function setRating(r){
rating = r;
let stars = document.querySelectorAll("#stars span");

stars.forEach((s,i)=>{
s.classList.toggle("active", i < r);
});
}

function addReview(){

let name = document.getElementById("name").value;
let message = document.getElementById("message").value;

if(!name || !message || rating==0){
alert("Please complete all fields");
return;
}

let stars = "★★★★★".slice(0,rating);

let reviewHTML = `
<div class="review-card">
<div class="review-header">
<span class="customer">${name}</span>
<span class="stars">${stars}</span>
</div>
<div class="review-text">${message}</div>
</div>
`;

document.getElementById("reviewsList").innerHTML += reviewHTML;

document.querySelector(".empty").style.display="none";

/* RESET */
document.getElementById("name").value="";
document.getElementById("message").value="";
setRating(0);

}

</script>

</body>
</html>
