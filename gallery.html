<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
color:#111;
}

/* HEADER (SAME AS ALL PAGES) */
.nav{
position:fixed;
top:0;
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 40px;
background:white;
border-bottom:1px solid #eee;
z-index:1000;
}

.logo img{
height:50px;
transform:scale(1.78);
transform-origin:left center;
}

.menu{
display:flex;
gap:25px;
margin-right:70px;
}

.menu a{
color:#333;
text-decoration:none;
font-weight:500;
}

/* HERO */
.hero{
height:60vh;
background:
linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
url('https://images.unsplash.com/photo-1503387762-592deb58ef4e');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

.hero h1{
font-size:40px;
}

/* GALLERY GRID */
.gallery{
padding:80px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
max-width:1200px;
margin:auto;
}

.gallery img{
width:100%;
height:260px;
object-fit:cover;
border-radius:10px;
transition:0.4s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.08);
}

/* FOOTER */
footer{
background:white;
padding:40px;
border-top:1px solid #eee;
}

.footer-container{
display:flex;
align-items:center;
gap:50px;
max-width:1200px;
margin:auto;
}

.footer-logo img{
height:120px;
}

.footer-details p{
margin:6px 0;
color:#555;
}

</style>
