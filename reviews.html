<!DOCTYPE html>
<html>
<head>
<title>Waheguru Builders Ltd</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* GLOBAL */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
color:#111;
line-height:1.6;
}

/* HEADER */
.nav{
position:fixed;
top:0;
width:100%;
display:flex;
align-items:center;
justify-content:space-between; /* 👈 IMPORTANT */
padding:18px 40px;
background:white;
border-bottom:1px solid #eee;
z-index:1000;
}
.logo img{
height:50px;
transform:scale(1.75);
transform-origin:left center;
}

/* MENU */
.menu{
display:flex;
gap:25px;
margin-left:auto;
margin-right:60px; /* 👈 THIS brings it slightly left */
}
.menu a{
text-decoration:none;
color:#333;
font-weight:500;
position:relative;
padding-bottom:5px;
}

.menu a::after{
content:'';
position:absolute;
left:0;
bottom:0;
width:0%;
height:2px;
background:#d4af37;
transition:0.3s;
}

.menu a:hover{
color:#d4af37;
}

.menu a:hover::after{
width:100%;
}
.menu a.active{
color:#d4af37;
}

.menu a.active::after{
width:100%;
}
  
/* HERO */
.hero{
height:55vh;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url('https://images.unsplash.com/photo-1600607687939-ce8a6c25118c');
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{font-size:42px;}

/* SECTION */
.section{
padding:100px 20px;
background:#f8f8f8;
text-align:center;
}

.empty{color:#777;margin-bottom:40px;}

.reviews{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
max-width:1200px;
margin:auto;
}

.review-card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
text-align:left;
}

.review-header{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.customer{font-weight:bold;}
.stars{color:#d4af37;}

.review-text{color:#555;font-size:14px;}

.form{
max-width:500px;
margin:60px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

.star-select span{
font-size:26px;
cursor:pointer;
color:#ccc;
}

.star-select span.active{
color:#d4af37;
}

/* BUTTON */
.btn{
padding:14px 35px;
background:linear-gradient(135deg,#d4af37,#f5d76e,#b8962e);
border-radius:50px;
border:none;
cursor:pointer;
font-weight:600;
position:relative;
overflow:hidden;
}

.btn::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.5),transparent);
transition:0.6s;
}

.btn:hover::before{
left:100%;
}

  .btn:hover{
transform:translateY(-4px) scale(1.05);
box-shadow:0 20px 50px rgba(0,0,0,0.4);
}
/* FOOTER */
footer{
padding:40px;
background:white;
border-top:1px solid #eee;
}

.footer-container{
display:flex;
gap:40px;
align-items:center;
max-width:1200px;
margin:auto;
}

/* WHATSAPP */
.wa-btn{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.wa-btn svg{
width:28px;
fill:white;
position:relative;
z-index:2;
}

.wa-btn::after{
content:'';
position:absolute;
width:100%;
height:100%;
border-radius:50%;
background:rgba(37,211,102,0.4);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);opacity:0.6;}
70%{transform:scale(1.6);opacity:0;}
100%{opacity:0;}
}


/* MOBILE FINAL FIX */
@media(max-width:768px){

/* BODY SAFE SPACE */
body{
padding-top:110px;
}

/* HEADER */
.nav{
flex-direction:column;
align-items:flex-start;
padding:12px 20px;
}

/* LOGO */
.logo img{
height:40px;
transform:scale(1.4);
}

/* MENU */
.menu{
flex-wrap:wrap;
gap:10px;
margin:10px 0 0 0;
}

/* HERO */
.hero{
height:auto;
padding:60px 15px;
text-align:center;
}

.hero h1{
font-size:26px;
line-height:1.3;
}

.hero p{
font-size:14px;
}

/* BUTTON */
.btn{
padding:12px 25px;
font-size:14px;
}

/* CARDS (ALL TYPES) */
.card,
.service-card,
.review-card{
width:100% !important;
margin:0 auto;
}

/* GALLERY */
.gallery{
padding:60px 10px;
gap:12px;
}

.gallery img{
width:100%;
height:200px;
}

/* POPUP IMAGE */
.popup img{
max-width:95%;
max-height:80%;
}

/* FOOTER */
.footer-container{
flex-direction:column;
align-items:flex-start;
gap:20px;
}

.footer-logo img{
height:80px;
}

/* WHATSAPP */
.wa-btn{
width:55px;
height:55px;
bottom:15px;
right:15px;
}

}

</style>
</head>

<body>

<div class="nav">
<div class="logo"><a href="index.html"><img src="logo.png"></a></div>
<div class="menu">
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="gallery.html">Gallery</a>
<a href="reviews.html">Reviews</a>
<a href="contact.html">Contact</a>
</div>
</div>

<div class="hero">
<h1>Customer Reviews</h1>
</div>

<div class="section">

<p class="empty">No reviews yet. Be the first to share your experience.</p>

<div class="reviews" id="reviewsList"></div>

<div class="form">
<h3>Leave Your Feedback</h3>

<input id="name" placeholder="Your Name">
<textarea id="message" placeholder="Your feedback"></textarea>

<div class="star-select" id="stars">
<span onclick="setRating(1)">★</span>
<span onclick="setRating(2)">★</span>
<span onclick="setRating(3)">★</span>
<span onclick="setRating(4)">★</span>
<span onclick="setRating(5)">★</span>
</div>

<button class="btn" onclick="addReview()">Submit Review</button>
</div>

</div>

<footer>
<div class="footer-container">
<div><img src="logo.png" style="height:110px;"></div>
<div>
<p><strong>Waheguru Builders Ltd</strong></p>
<p>📍 8 Ash Lane, SL44PS, Windsor</p>
<p>📞 +44-7424479788</p>
<p>✉️ wahegurubuilders@gmail.com</p>
  <p style="font-size:12px;color:#777;margin-top:10px;">
We usually respond within 24 hours.
</p>
</div>
</div>
</footer>

<!-- WHATSAPP -->
<a href="https://wa.me/447424479788" class="wa-btn">
<svg viewBox="0 0 24 24">
<path d="M20.52 3.48A11.82 11.82 0 0012.05 0C5.48 0 .15 5.33.15 11.9c0 2.1.55 4.15 1.6 5.95L0 24l6.3-1.65a11.86 11.86 0 005.75 1.46h.01c6.57 0 11.9-5.33 11.9-11.9z"/>
</svg>
</a>

<script>
let rating=0;

function setRating(r){
rating=r;
document.querySelectorAll("#stars span").forEach((s,i)=>{
s.classList.toggle("active", i<r);
});
}

function addReview(){
let name=document.getElementById("name").value;
let message=document.getElementById("message").value;

if(!name || !message || rating==0){
alert("Fill all fields");
return;
}

let stars="★★★★★".slice(0,rating);

document.getElementById("reviewsList").innerHTML+=`
<div class="review-card">
<div class="review-header">
<span class="customer">${name}</span>
<span class="stars">${stars}</span>
</div>
<div class="review-text">${message}</div>
</div>`;

document.querySelector(".empty").style.display="none";

document.getElementById("name").value="";
document.getElementById("message").value="";
setRating(0);
}
</script>
<a href="reviews.html" class="active">Reviews</a>
</body>
</html>
