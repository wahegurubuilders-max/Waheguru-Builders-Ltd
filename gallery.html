<!DOCTYPE html>
<html>
<head>
<title>Waheguru Builders Ltd</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* HEADER */
.nav{
position:fixed;
top:0;
width:100%;
display:flex;
align-items:center;
justify-content:space-between; /* 👈 IMPORTANT */
padding:18px 40px;
background:white;
border-bottom:1px solid #eee;
z-index:1000;
}
.logo img{
height:50px;
transform:scale(1.75);
transform-origin:left center;
}

/* MENU */
.menu{
display:flex;
gap:25px;
margin-left:auto;
margin-right:60px; /* 👈 THIS brings it slightly left */
}
.menu a{
text-decoration:none;
color:#333;
font-weight:500;
position:relative;
padding-bottom:5px;
}

.menu a::after{
content:'';
position:absolute;
left:0;
bottom:0;
width:0%;
height:2px;
background:#d4af37;
transition:0.3s;
}

.menu a:hover{
color:#d4af37;
}

.menu a:hover::after{
width:100%;
}

/* HERO */
.hero{
height:60vh;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url('https://images.unsplash.com/photo-1503387762-592deb58ef4e');
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
margin-top:80px;
}

.hero h1{font-size:42px;}

/* GALLERY */
.gallery{
padding:80px 20px;
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.gallery img{
width:300px;
height:220px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

/* FOOTER */
footer{
padding:40px;
background:white;
border-top:1px solid #eee;
}

.footer-container{
display:flex;
gap:40px;
align-items:center;
max-width:1200px;
margin:auto;
}

.footer-logo img{height:110px;}

/* WHATSAPP (WORKING VERSION) */
.wa-float{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
z-index:9999;
}

.wa-float svg{
width:28px;
height:28px;
fill:white;
position:relative;
z-index:2;
}

.wa-float::after{
content:'';
position:absolute;
width:100%;
height:100%;
border-radius:50%;
background:rgba(37,211,102,0.4);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);opacity:0.6;}
70%{transform:scale(1.6);opacity:0;}
100%{opacity:0;}
}

/* MOBILE */
@media(max-width:768px){
.nav{flex-direction:column;align-items:flex-start;}
.menu{flex-wrap:wrap;margin-top:10px;}
.gallery{flex-direction:column;align-items:center;}
.footer-container{flex-direction:column;}
}

</style>
</head>
