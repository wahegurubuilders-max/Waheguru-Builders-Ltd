<!DOCTYPE html>
<html>
<head>
<title>Waheguru Builders Ltd</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* GLOBAL */
body{
margin:0;
font-family:'Segoe UI',sans-serif;
color:#111;
line-height:1.6;
}

/* HEADER */
.nav{
position:fixed;
top:0;
width:100%;
display:flex;
align-items:center;
justify-content:space-between; /* 👈 IMPORTANT */
padding:18px 40px;
background:white;
border-bottom:1px solid #eee;
z-index:1000;
}
.logo img{
height:50px;
transform:scale(1.75);
transform-origin:left center;
}

/* MENU */
.menu{
display:flex;
gap:25px;
margin-left:auto;
margin-right:60px; /* 👈 THIS brings it slightly left */
}
.menu a{
text-decoration:none;
color:#333;
font-weight:500;
position:relative;
padding-bottom:5px;
}

.menu a::after{
content:'';
position:absolute;
left:0;
bottom:0;
width:0%;
height:2px;
background:#d4af37;
transition:0.3s;
}

.menu a:hover{
color:#d4af37;
}

.menu a:hover::after{
width:100%;
}
  
.menu a.active{
color:#d4af37;
}

.menu a.active::after{
width:100%;
}
/* HERO */
.hero{
height:60vh;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
url('https://images.unsplash.com/photo-1503387762-592deb58ef4e');
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
margin-top:80px;
}

.hero h1{font-size:42px;}

/* GALLERY */
.gallery{
padding:80px 20px;
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.gallery img{
width:300px;
height:220px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

/* HOVER EFFECT */
.gallery img:hover{
transform:scale(1.05);
box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:2000;
}

.popup img{
max-width:90%;
max-height:90%;
}

.popup .close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
color:white;
cursor:pointer;
}

.nav-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:40px;
color:white;
cursor:pointer;
padding:10px;
}

.prev{left:20px;}
.next{right:20px;}

/* FOOTER */
footer{
padding:40px;
background:white;
border-top:1px solid #eee;
}

.footer-container{
display:flex;
gap:40px;
align-items:center;
max-width:1200px;
margin:auto;
}

.footer-logo img{height:110px;}

/* WHATSAPP */
.wa-float{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
z-index:9999;
}

.wa-float svg{
width:28px;
height:28px;
fill:white;
}

.wa-float::after{
content:'';
position:absolute;
width:100%;
height:100%;
border-radius:50%;
background:rgba(37,211,102,0.4);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
70%{transform:scale(1.6);opacity:0;}
100%{opacity:0;}
}

/* MOBILE */
@media(max-width:768px){
.nav{flex-direction:column;align-items:flex-start;}
.menu{flex-wrap:wrap;margin-top:10px;}
.gallery{flex-direction:column;align-items:center;}
.footer-container{flex-direction:column;}
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div class="logo"><a href="index.html"><img src="logo.png"></a></div>

<div class="menu">
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="gallery.html">Gallery</a>
<a href="reviews.html">Reviews</a>
<a href="contact.html">Contact</a>
</div>
</div>

<!-- HERO -->
<div class="hero">
<h1>Our Work</h1>
</div>

<!-- GALLERY -->
<div class="gallery">
<img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
<img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd">
<img src="https://images.unsplash.com/photo-1600585154526-990dced4db0d">
<img src="https://images.unsplash.com/photo-1600607688969-a5bfcd646154">
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<span class="close" onclick="closeImage()">×</span>
<div class="nav-btn prev" onclick="prevImage()">❮</div>
<img id="popup-img">
<div class="nav-btn next" onclick="nextImage()">❯</div>
</div>

<!-- FOOTER -->
<footer>
<div class="footer-container">
<div class="footer-logo"><img src="logo.png"></div>
<div>
<p><strong>Waheguru Builders Ltd</strong></p>
<p>Company No: 14736396</p>
<p>📍 8 Ash lane, SL44PS, Windsor</p>
<p>📞 +44-7424479788</p>
<p>✉️ wahegurubuilders@gmail.com</p>
<p style="font-size:12px;color:#777;margin-top:10px;">
We usually respond within 24 hours.
</p>
</div>
</div>
</footer>

<!-- WHATSAPP -->
<a href="https://wa.me/447424479788" target="_blank" class="wa-float">
<svg viewBox="0 0 24 24">
<path d="M20.52 3.48A11.82 11.82 0 0012.05 0C5.48 0 .15 5.33.15 11.9c0 2.1.55 4.15 1.6 5.95L0 24l6.3-1.65a11.86 11.86 0 005.75 1.46h.01c6.57 0 11.9-5.33 11.9-11.9z"/>
</svg>
</a>

<script>

let images=[];
let current=0;

document.querySelectorAll('.gallery img').forEach((img,i)=>{
images.push(img.src);
img.onclick=()=>openImage(i);
});

function openImage(i){
current=i;
document.getElementById("popup").style.display="flex";
document.getElementById("popup-img").src=images[i];
}

function closeImage(){
document.getElementById("popup").style.display="none";
}

function nextImage(){
current=(current+1)%images.length;
document.getElementById("popup-img").src=images[current];
}

function prevImage(){
current=(current-1+images.length)%images.length;
document.getElementById("popup-img").src=images[current];
}

/* KEYBOARD SUPPORT */
document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowRight") nextImage();
if(e.key==="ArrowLeft") prevImage();
if(e.key==="Escape") closeImage();
});

/* SWIPE */
let startX=0;

document.getElementById("popup").addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});

document.getElementById("popup").addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;

if(startX-endX>50) nextImage();
if(endX-startX>50) prevImage();
});

</script>
<a href="gallery.html" class="active">Gallery</a>
</body>
</html>
