<!DOCTYPE html>
<html>
<head>
<title>Gallery - Waheguru Builders Ltd</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
}

/* HEADER */
.nav{
position:fixed;
top:0;
width:100%;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 40px;
background:white;
border-bottom:1px solid #eee;
z-index:1000;
}

.logo img{
height:50px;
transform:scale(1.78);
transform-origin:left center;
}

.menu{
display:flex;
gap:25px;
margin-right:70px;
}

.menu a{
color:#333;
text-decoration:none;
font-weight:500;
white-space:nowrap;
}

.menu a:hover{
color:#d4af37;
}

/* HERO */
.hero{
height:60vh;
background:
linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
url('https://images.unsplash.com/photo-1503387762-592deb58ef4e');
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.hero h1{
font-size:40px;
}

/* GALLERY */
.gallery{
padding:100px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
max-width:1200px;
margin:auto;
}

.gallery img{
width:100%;
height:260px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:2000;
}

.popup img{
max-width:90%;
max-height:90%;
border-radius:10px;
touch-action:none; /* IMPORTANT FOR SWIPE */
}

/* CLOSE */
.popup span{
position:absolute;
top:20px;
right:30px;
font-size:30px;
color:white;
cursor:pointer;
}

/* BUTTONS */
.nav-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:40px;
color:white;
cursor:pointer;
padding:10px 20px;
background:rgba(0,0,0,0.4);
border-radius:5px;
}

.prev{left:20px;}
.next{right:20px;}

/* FOOTER */
footer{
background:white;
padding:40px;
border-top:1px solid #eee;
}

.footer-container{
display:flex;
align-items:center;
gap:50px;
max-width:1200px;
margin:auto;
}

.footer-logo img{height:120px;}

.footer-details p{margin:6px 0;color:#555;}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div class="logo"><a href="index.html"><img src="logo.png"></a></div>

<div class="menu">
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="gallery.html">Gallery</a>
<a href="reviews.html">Reviews</a>
<a href="contact.html">Contact</a>
</div>
</div>

<!-- HERO -->
<div class="hero">
<h1>Our Projects</h1>
</div>

<!-- GALLERY -->
<div class="gallery">

<img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e" onclick="openImage(0)">
<img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd" onclick="openImage(1)">
<img src="https://images.unsplash.com/photo-1600585154526-990dced4db0d" onclick="openImage(2)">
<img src="https://images.unsplash.com/photo-1600607688969-a5bfcd646154" onclick="openImage(3)">
<img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c" onclick="openImage(4)">
<img src="https://images.unsplash.com/photo-1599423300746-b62533397364" onclick="openImage(5)">

</div>

<!-- POPUP -->
<div class="popup" id="popup">

<span onclick="closeImage()">×</span>

<div class="nav-btn prev" onclick="prevImage()">❮</div>
<div class="nav-btn next" onclick="nextImage()">❯</div>

<img id="popup-img">

</div>

<!-- FOOTER -->
<footer>
<div class="footer-container">
<div class="footer-logo"><img src="logo.png"></div>

<div class="footer-details">
<p><strong>Waheguru Builders Ltd</strong></p>
<p>Company No: 14736396</p>
<p>📍 8 Ash Lane, Windsor, SL44PS</p>
<p>📞 +44-7424479788</p>
<p>✉️ wahegurubuilders@gmail.com</p>
</div>
</div>
</footer>

<!-- SCRIPT -->
<script>

let images = [
"https://images.unsplash.com/photo-1503387762-592deb58ef4e",
"https://images.unsplash.com/photo-1504307651254-35680f356dfd",
"https://images.unsplash.com/photo-1600585154526-990dced4db0d",
"https://images.unsplash.com/photo-1600607688969-a5bfcd646154",
"https://images.unsplash.com/photo-1600607687939-ce8a6c25118c",
"https://images.unsplash.com/photo-1599423300746-b62533397364"
];

let currentIndex = 0;
let startX = 0;

/* OPEN */
function openImage(index){
currentIndex = index;
document.getElementById("popup").style.display="flex";
document.getElementById("popup-img").src = images[currentIndex];
}

/* CLOSE */
function closeImage(){
document.getElementById("popup").style.display="none";
}

/* NEXT / PREV */
function nextImage(){
currentIndex = (currentIndex + 1) % images.length;
document.getElementById("popup-img").src = images[currentIndex];
}

function prevImage(){
currentIndex = (currentIndex - 1 + images.length) % images.length;
document.getElementById("popup-img").src = images[currentIndex];
}

/* SWIPE SUPPORT */
const popupImg = document.getElementById("popup-img");

popupImg.addEventListener("touchstart", function(e){
startX = e.touches[0].clientX;
});

popupImg.addEventListener("touchend", function(e){
let endX = e.changedTouches[0].clientX;

if(startX - endX > 50){
nextImage(); // swipe left
}
else if(endX - startX > 50){
prevImage(); // swipe right
}
});

</script>

</body>
</html>
