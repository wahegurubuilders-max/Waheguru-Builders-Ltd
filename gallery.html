<!DOCTYPE html>
<html>
<head>
<title>Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;color:#111;}

/* SAME HEADER AS INDEX */
.nav{
position:fixed;top:0;width:100%;
display:flex;align-items:center;justify-content:space-between;
padding:15px 40px;background:white;border-bottom:1px solid #eee;
z-index:1000;
}

.logo img{
height:50px;
transform:scale(1.78);
transform-origin:left center;
}

.menu{
display:flex;
gap:25px;
margin-right:70px;
}

.menu a{
color:#333;text-decoration:none;font-weight:500;
}

/* GALLERY */
.gallery{
padding-top:120px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:15px;
padding-left:20px;
padding-right:20px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:10px;
transition:0.3s;
}

.gallery img:hover{transform:scale(1.05);}

/* SAME FOOTER */
footer{background:white;padding:40px;border-top:1px solid #eee;}
.footer-container{display:flex;align-items:center;gap:50px;max-width:1200px;margin:auto;}
.footer-logo img{height:120px;}
.footer-details p{margin:6px 0;color:#555;}

</style>
</head>

<body>

<div class="nav">
<div class="logo"><a href="index.html"><img src="logo.png"></a></div>
<div class="menu">

<a href="services.html">Services</a>

</div>
</div>

<img src="https://images.unsplash.com/photo-1600607688969-a5bfcd646154">
</div>
