<!DOCTYPE html>
<html>
<head>
<title>Reviews - Waheguru Builders Ltd</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{margin:0;font-family:'Segoe UI',sans-serif;color:#111;}

/* HEADER */
.nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;
padding:15px 40px;background:white;border-bottom:1px solid #eee;
}

.logo img{height:50px;transform:scale(1.78);}

.menu{display:flex;gap:25px;margin-right:70px;}

.hero{
height:50vh;
background:linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
url('https://images.unsplash.com/photo-1503387762-592deb58ef4e');
background-size:cover;
display:flex;align-items:center;justify-content:center;
color:white;
}

/* SECTION */
.section{padding:80px 20px;text-align:center;background:#fafafa;}

.reviews{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
}

/* CARD */
.review-card{
background:white;padding:25px;border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
text-align:left;
}

.stars{color:#d4af37;font-size:18px;margin-bottom:10px;}

/* FORM */
.form{
max-width:500px;
margin:50px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

/* STAR INPUT */
.star-select span{
font-size:25px;
cursor:pointer;
color:#ccc;
}

.star-select span.active{
color:#d4af37;
}

/* BUTTON */
.btn{
padding:12px 25px;
background:#d4af37;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:bold;
}

/* FOOTER */
footer{background:white;padding:40px;border-top:1px solid #eee;}

</style>
</head>

<body>

<div class="nav">
<div class="logo"><a href="index.html"><img src="logo.png"></a></div>

<div class="menu">
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="gallery.html">Gallery</a>
<a href="reviews.html">Reviews</a>
<a href="contact.html">Contact</a>
</div>
</div>

<div class="hero">
<h1>Customer Reviews</h1>
</div>

<div class="section">

<!-- REVIEWS DISPLAY -->
<div class="reviews" id="reviewsList">

<div class="review-card">
<div class="stars">★★★★★</div>
<p>Excellent work and professional service.</p>
<b>— John Smith</b>
</div>

</div>

<!-- FORM -->
<div class="form">

<h3>Leave a Review</h3>

<input type="text" id="name" placeholder="Your Name">

<div class="star-select" id="stars">
<span onclick="setRating(1)">★</span>
<span onclick="setRating(2)">★</span>
<span onclick="setRating(3)">★</span>
<span onclick="setRating(4)">★</span>
<span onclick="setRating(5)">★</span>
</div>

<textarea id="message" placeholder="Write your feedback"></textarea>

<button class="btn" onclick="addReview()">Submit Review</button>

</div>

</div>

<footer>
<p style="text-align:center;">© Waheguru Builders Ltd</p>
</footer>

<script>

let rating = 0;

function setRating(r){
rating = r;
let stars = document.querySelectorAll("#stars span");

stars.forEach((s,i)=>{
s.classList.toggle("active", i < r);
});
}

function addReview(){

let name = document.getElementById("name").value;
let message = document.getElementById("message").value;

if(!name || !message || rating==0){
alert("Please complete all fields");
return;
}

let stars = "★★★★★".slice(0,rating) + "☆☆☆☆☆".slice(rating);

let reviewHTML = `
<div class="review-card">
<div class="stars">${stars}</div>
<p>${message}</p>
<b>— ${name}</b>
</div>
`;

document.getElementById("reviewsList").innerHTML += reviewHTML;

/* RESET */
document.getElementById("name").value="";
document.getElementById("message").value="";
setRating(0);

}

</script>

</body>
</html>
